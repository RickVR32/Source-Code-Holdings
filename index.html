<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Private infrastructure holding entity." />
<meta name="robots" content="noindex, nofollow" />
<title>Source Code Holdings</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f2f1ee;
  --bg-soft:#e9e8e3;
  --panel:#fafaf8;
  --text:#0d0d0c;
  --muted:#8a887f;
  --line:rgba(0,0,0,0.08);
  --line-strong:rgba(0,0,0,0.16);
  --grid-line:rgba(0,0,0,0.045);
}

[data-theme="dark"]{
  --bg:#0a0a08;
  --bg-soft:#121210;
  --panel:#181816;
  --text:#e8e6e0;
  --muted:#72706b;
  --line:rgba(255,255,255,0.06);
  --line-strong:rgba(255,255,255,0.14);
  --grid-line:rgba(255,255,255,0.022);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background-color:var(--bg);
  background-image:
    linear-gradient(180deg,var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:44px 44px;
  color:var(--text);
  font-family:'Geist Mono', monospace;
  font-weight:300;
}

.container{
  width:min(1100px, calc(100% - 48px));
  margin:auto;
}

/* HERO (unchanged visually trimmed) */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:60px 0 100px;
}

.hero-logo img{
  width:140px;
}

.hero-name{
  font-family:'Cormorant', serif;
  font-size:2rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
}

.hero-divider{
  width:34px;height:1px;
  background:var(--line-strong);
  margin:30px auto;
}

.hero-copy{
  max-width:600px;
  font-size:0.82rem;
  line-height:2;
  color:var(--muted);
}

/* CONTACT */
.contact{
  padding-bottom:120px;
}

.contact-box{
  max-width:760px;
  margin:auto;
  padding-top:42px;
  border-top:1px solid var(--line);
}

.contact-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:24px;
}

.contact-head h2{
  font-family:'Cormorant', serif;
  font-weight:300;
  font-size:1.5rem;
}

.contact-head span{
  font-size:0.65rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--muted);
}

.contact-copy{
  max-width:520px;
  font-size:0.8rem;
  line-height:1.9;
  color:var(--muted);
  margin-bottom:28px;
}

/* FORM */
.scm-form{
  display:grid;
  gap:12px;
  max-width:520px;
}

.scm-form input,
.scm-form select,
.scm-form textarea{
  padding:12px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--text);
  border-radius:10px;
  font-family:inherit;
  font-size:0.8rem;
}

.scm-form textarea{
  min-height:120px;
}

.scm-form button{
  padding:12px 20px;
  border-radius:999px;
  border:1px solid var(--line-strong);
  background:var(--panel);
  color:var(--text);
  cursor:pointer;
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-size:0.65rem;
}

.contact-link{
  display:inline-flex;
  margin-top:24px;
  text-decoration:none;
  border:1px solid var(--line-strong);
  border-radius:999px;
  padding:10px 22px;
  font-size:0.68rem;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<section class="hero">
  <div class="hero-logo">
    <img src="sch_sygil.png" alt="SCH" />
  </div>

  <div class="hero-name">Source Code Holdings</div>

  <div class="hero-divider"></div>

  <p class="hero-copy">
    A private holding company. We own the IP, system architecture,
    and infrastructure.
  </p>
</section>

<!-- CONTACT -->
<section class="contact">

  <div class="contact-box">

    <div class="contact-head">
      <h2>External Communication</h2>
      <span>Restricted</span>
    </div>

    <p class="contact-copy">
      Source Code Holdings Ltd does not engage in public correspondence.
      Select enquiries may be processed through controlled intake.
    </p>

    <!-- ✅ FORMSPREE -->
    <form class="scm-form"
          action="https://formspree.io/f/xpqobvev"
          method="POST">

      <input name="name" type="text" placeholder="Identifier / Name" required>

      <input name="contact" type="text" placeholder="Contact channel" required>

      <select name="subject">
        <option>General Enquiry</option>
        <option>Partnership</option>
        <option>Investment / Grant</option>
        <option>Technical Discussion</option>
        <option>IP / Licensing</option>
      </select>

      <textarea name="message" placeholder="Enquiry details..." required></textarea>

      <input type="hidden" name="_subject" value="SCH Incoming Enquiry">

      <button type="submit">Transmit Enquiry</button>

    </form>

    <a class="contact-link" href="https://umni-systems.com" target="_blank">
      Access Point →
    </a>

  </div>

</section>

</div>

</body>
</html>
